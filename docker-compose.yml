services:
  api:
    environment:
      LOG_LEVEL: DEBUG
    build: .
    container_name: invoice_api
    ports:
      - "8000:8000"
    volumes:
      - ./app/uploads:/app/app/uploads
      - ./app/reports:/app/app/reports
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: invoice_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: invoices
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d invoices"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
